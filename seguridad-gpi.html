<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GPI · Cómo protegemos tu información</title>
<link rel="preconnect" href="https://api.fontshare.com" />
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@300,400,500,600,700&f[]=jetbrains-mono@400,500&display=swap" rel="stylesheet" />
<style>
  :root {
    --green: #3C7A4B;
    --green-deep: #2E5E39;
    --green-ink: #0C2316;
    --green-soft: rgba(60, 122, 75, 0.12);
    --sans: 'General Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    --ease: cubic-bezier(0.2, 0.7, 0.1, 1);
  }
  [data-theme="light"] {
    --bg: #FAFAF7; --bg-elev: #FFFFFF; --bg-elev-2: #F0F0EC;
    --fg: #0A0A0A; --fg-muted: #6B6B6B; --fg-faint: #B5B5B0;
    --line: rgba(0,0,0,0.08); --line-strong: rgba(0,0,0,0.16);
  }
  [data-theme="dark"] {
    --bg: #0A0A0A; --bg-elev: #131313; --bg-elev-2: #1A1A1A;
    --fg: #FAFAF7; --fg-muted: #8A8A8A; --fg-faint: #4A4A4A;
    --line: rgba(255,255,255,0.10); --line-strong: rgba(255,255,255,0.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--fg);
    font-family: var(--sans); font-feature-settings: "ss01","ss02";
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; padding: 32px 24px 48px;
    transition: background .5s var(--ease), color .5s var(--ease);
  }
  .page { width: 100%; max-width: 1240px; }
  header.top {
    display: flex; align-items: flex-end; justify-content: space-between;
    gap: 24px; margin-bottom: 22px; flex-wrap: wrap;
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand .logo { height: 30px; width: auto; display: block; }
  .brand .sep { width: 1px; height: 34px; background: var(--line-strong); }
  .eyebrow {
    font-family: var(--mono); font-size: 11px; letter-spacing: .18em;
    text-transform: uppercase; color: var(--green); margin-bottom: 4px;
  }
  h1 { font-size: 26px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.05; }
  .toggle {
    font-family: var(--mono); font-size: 11px; letter-spacing: .08em;
    text-transform: uppercase; color: var(--fg-muted);
    background: var(--bg-elev); border: 1px solid var(--line-strong);
    border-radius: 999px; padding: 8px 16px; cursor: pointer;
    transition: all .3s var(--ease); white-space: nowrap;
  }
  .toggle:hover { color: var(--green); border-color: var(--green); }
  .slide {
    background: var(--bg-elev); border: 1px solid var(--line);
    border-radius: 22px; padding: 8px;
    box-shadow: 0 24px 60px -28px rgba(0,0,0,0.28);
  }
  svg.diagram { width: 100%; height: auto; display: block; }
  footer.note {
    margin-top: 18px; font-family: var(--mono); font-size: 11px;
    letter-spacing: .04em; color: var(--fg-faint); text-align: center;
  }
</style>
</head>
<body>
<div class="page">
  <header class="top">
    <div class="brand">
      <svg class="logo" viewBox="0 0 440 215" aria-label="GPI">
        <path fill="var(--green)" fill-rule="evenodd" d="M108.3 0.8 L126.0 1.2 L138.3 3.7 L155.8 8.3 L166.0 12.9 L175.8 18.8 L185.5 26.0 L191.8 32.2 L191.6 35.2 L189.4 39.3 L185.2 44.5 L170.8 59.2 L168.5 61.3 L165.7 62.8 L164.5 62.9 L163.2 62.2 L145.9 49.3 L137.0 45.0 L124.2 41.6 L109.2 40.8 L101.2 41.6 L93.4 43.5 L85.7 46.4 L77.9 50.3 L71.1 54.6 L65.6 59.3 L58.2 69.0 L53.8 77.5 L50.3 87.1 L48.0 97.1 L47.0 106.1 L47.3 114.7 L48.9 124.6 L51.9 135.1 L54.0 140.0 L59.3 149.0 L62.8 153.2 L71.8 161.0 L82.4 167.7 L91.3 171.8 L98.9 173.8 L106.0 174.9 L112.9 175.2 L120.6 174.7 L132.5 172.5 L148.0 166.8 L150.5 164.7 L151.5 162.2 L152.0 151.2 L151.4 143.0 L145.0 142.2 L119.9 141.4 L116.5 140.7 L115.9 138.8 L115.2 130.1 L115.1 118.2 L115.8 111.4 L122.3 110.4 L154.4 109.0 L177.6 109.5 L188.8 109.0 L194.2 108.1 L197.7 106.6 L203.2 102.7 L205.9 99.3 L208.9 93.5 L209.9 88.9 L210.7 8.0 L212.5 4.0 L231.5 3.1 L293.5 2.7 L315.4 3.0 L323.9 4.1 L338.5 7.5 L352.7 13.2 L358.5 16.7 L368.2 24.2 L372.6 28.5 L375.7 32.5 L381.5 42.0 L385.1 50.7 L388.0 61.6 L390.0 73.9 L389.1 83.6 L385.8 98.1 L382.1 106.8 L377.3 114.3 L372.0 121.0 L366.7 126.5 L356.0 134.6 L348.9 138.8 L337.2 142.9 L321.5 146.2 L309.1 147.4 L281.7 147.9 L262.0 147.1 L258.2 147.8 L256.9 159.7 L255.5 210.1 L255.1 210.7 L252.4 211.1 L247.3 211.5 L222.4 211.6 L213.4 210.8 L212.1 210.2 L211.1 207.3 L210.0 194.6 L210.2 168.6 L211.2 157.1 L212.1 152.3 L214.8 143.6 L220.2 133.1 L225.9 125.7 L235.5 117.6 L242.8 113.6 L253.9 110.4 L262.0 109.1 L303.5 108.4 L316.0 107.3 L325.1 104.0 L330.5 100.6 L334.7 97.0 L337.5 93.4 L339.6 89.2 L342.3 79.3 L342.4 70.5 L340.1 62.2 L335.8 54.8 L330.7 49.6 L322.3 44.8 L311.6 41.4 L288.9 40.7 L257.4 41.3 L256.5 51.3 L255.5 84.1 L254.0 94.6 L232.9 102.2 L218.5 110.4 L215.2 112.8 L213.5 114.9 L203.5 132.0 L199.8 140.4 L197.4 147.6 L195.7 154.8 L194.7 162.6 L194.0 178.7 L193.2 183.6 L191.9 187.5 L189.9 190.4 L184.4 194.4 L173.8 200.8 L165.6 204.8 L157.0 208.1 L147.7 210.8 L137.6 213.1 L126.3 214.5 L113.7 214.8 L102.2 214.4 L92.5 213.4 L79.7 210.9 L67.9 207.0 L59.8 203.2 L51.3 198.3 L42.6 192.5 L30.6 182.0 L23.6 174.2 L18.0 166.7 L10.6 153.8 L6.0 140.4 L2.6 126.9 L0.6 109.2 L2.5 89.9 L4.9 78.8 L8.4 67.9 L14.3 54.7 L22.5 42.3 L33.0 30.5 L41.5 23.6 L54.0 15.3 L65.6 9.8 L77.9 5.6 L94.7 1.8 L104.8 0.9 Z M409.7 2.9 L436.7 2.8 L438.9 4.4 L439.4 132.0 L438.9 209.3 L438.6 210.1 L435.8 210.7 L422.9 211.4 L396.6 211.3 L394.6 210.2 L393.5 208.0 L393.9 195.6 L393.3 181.4 L393.2 143.1 L394.3 121.3 L395.5 115.3 L400.1 104.5 L403.2 93.4 L405.5 78.3 L405.0 66.1 L404.0 58.3 L401.4 48.9 L396.9 37.1 L393.9 24.8 L393.4 18.7 L393.7 4.9 L393.9 3.2 L401.8 3.0 Z"/>
      </svg>
      <span class="sep"></span>
      <div>
        <div class="eyebrow">Arquitectura de seguridad</div>
        <h1>Cómo protegemos tu información</h1>
      </div>
    </div>
    <button class="toggle" id="themeToggle" aria-label="Cambiar tema">◐ Tema</button>
  </header>

  <div class="slide">
    <svg class="diagram" viewBox="0 0 1300 538" role="img" aria-label="Diagrama de seguridad de la plataforma GPI">
      <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="7.5" refY="3.2" orient="auto" markerUnits="userSpaceOnUse">
          <path d="M0,0 L8,3.2 L0,6.4 Z" fill="var(--green)"/>
        </marker>
        <!-- Padlock symbol -->
        <g id="lock">
          <rect x="-7" y="-1.5" width="14" height="11" rx="2.5" fill="var(--green)"/>
          <path d="M -4.3 -1.5 V -5 a 4.3 4.3 0 0 1 8.6 0 V -1.5" fill="none" stroke="var(--green)" stroke-width="2"/>
          <circle cx="0" cy="4" r="1.5" fill="var(--bg-elev)"/>
        </g>
        <!-- Person glyph -->
        <g id="user">
          <circle cx="0" cy="-12" r="11" fill="var(--green)"/>
          <path d="M -19 18 a 19 19 0 0 1 38 0 Z" fill="var(--green)"/>
        </g>
        <!-- Database cylinder -->
        <g id="db">
          <ellipse cx="0" cy="-12" rx="15" ry="5" fill="var(--green)"/>
          <path d="M -15 -12 V 12 a 15 5 0 0 0 30 0 V -12" fill="var(--green-soft)" stroke="var(--green)" stroke-width="2"/>
          <ellipse cx="0" cy="-12" rx="15" ry="5" fill="none" stroke="var(--green)" stroke-width="2"/>
        </g>
      </defs>

      <!-- ============ ZONE LABELS ============ -->
      <text x="114" y="40" text-anchor="middle" font-family="var(--mono)" font-size="11" letter-spacing="2" fill="var(--fg-faint)">INTERNET</text>
      <text x="582" y="40" text-anchor="middle" font-family="var(--mono)" font-size="11" letter-spacing="2" fill="var(--green)">GOOGLE CLOUD · RED PRIVADA INTERNA</text>
      <text x="1096" y="40" text-anchor="middle" font-family="var(--mono)" font-size="11" letter-spacing="2" fill="var(--fg-faint)">SERVICIOS EXTERNOS</text>

      <!-- ============ GCP CONTAINER ============ -->
      <rect x="262" y="54" width="640" height="170" rx="20" fill="var(--green-soft)" stroke="var(--green)" stroke-width="1.5" stroke-dasharray="7 6"/>

      <!-- ============ NODES ============ -->
      <!-- Usuario -->
      <rect x="28" y="74" width="172" height="130" rx="16" fill="var(--bg-elev)" stroke="var(--line-strong)" stroke-width="1.5"/>
      <g transform="translate(114,118)"><use href="#user"/></g>
      <text x="114" y="172" text-anchor="middle" font-family="var(--sans)" font-size="16" font-weight="600" fill="var(--fg)">Usuario</text>
      <text x="114" y="191" text-anchor="middle" font-family="var(--mono)" font-size="11" fill="var(--fg-muted)">navegador web</text>

      <!-- Front -->
      <rect x="290" y="74" width="210" height="130" rx="16" fill="var(--bg-elev)" stroke="var(--green)" stroke-width="2"/>
      <rect x="306" y="86" width="78" height="20" rx="10" fill="none" stroke="var(--green)" stroke-width="1.3"/>
      <text x="345" y="100" text-anchor="middle" font-family="var(--mono)" font-size="10" letter-spacing="1" fill="var(--green)">PÚBLICO</text>
      <text x="395" y="146" text-anchor="middle" font-family="var(--sans)" font-size="17" font-weight="600" fill="var(--fg)">Servidor Front</text>
      <text x="395" y="167" text-anchor="middle" font-family="var(--mono)" font-size="11" fill="var(--fg-muted)">gp-inversiones</text>
      <text x="395" y="190" text-anchor="middle" font-family="var(--sans)" font-size="11.5" fill="var(--fg-faint)">única puerta a internet</text>

      <!-- Back -->
      <rect x="662" y="74" width="210" height="130" rx="16" fill="var(--bg-elev)" stroke="var(--green)" stroke-width="2"/>
      <rect x="716" y="86" width="84" height="20" rx="10" fill="var(--green)"/>
      <text x="758" y="100" text-anchor="middle" font-family="var(--mono)" font-size="10" letter-spacing="1" fill="#FAFAF7">PRIVADO</text>
      <text x="767" y="146" text-anchor="middle" font-family="var(--sans)" font-size="17" font-weight="600" fill="var(--fg)">Backend</text>
      <text x="767" y="167" text-anchor="middle" font-family="var(--mono)" font-size="11" fill="var(--fg-muted)">avsa-api</text>
      <text x="767" y="190" text-anchor="middle" font-family="var(--sans)" font-size="11.5" fill="var(--fg-faint)">sin acceso desde internet</text>

      <!-- Neon -->
      <rect x="996" y="62" width="200" height="86" rx="14" fill="var(--bg-elev)" stroke="var(--line-strong)" stroke-width="1.5"/>
      <g transform="translate(1018,107)"><use href="#db"/></g>
      <text x="1050" y="100" text-anchor="start" font-family="var(--sans)" font-size="15" font-weight="600" fill="var(--fg)">Base de datos</text>
      <text x="1050" y="120" text-anchor="start" font-family="var(--mono)" font-size="11" fill="var(--fg-muted)">Neon</text>

      <!-- Higyrus -->
      <rect x="996" y="160" width="200" height="86" rx="14" fill="var(--bg-elev)" stroke="var(--line-strong)" stroke-width="1.5"/>
      <g transform="translate(1018,205)"><use href="#db"/></g>
      <text x="1050" y="198" text-anchor="start" font-family="var(--sans)" font-size="15" font-weight="600" fill="var(--fg)">API Higyrus</text>
      <text x="1050" y="218" text-anchor="start" font-family="var(--mono)" font-size="11" fill="var(--fg-muted)">AVSA / broker</text>

      <!-- ============ ARROWS ============ -->
      <!-- user -> front -->
      <line x1="200" y1="139" x2="282" y2="139" stroke="var(--green)" stroke-width="2.2" marker-end="url(#arrow)"/>
      <g transform="translate(222,118) scale(0.82)"><use href="#lock"/></g>
      <text x="233" y="122" text-anchor="start" font-family="var(--mono)" font-size="11" font-weight="500" fill="var(--green)">HTTPS</text>

      <!-- front -> back (2 factores) -->
      <line x1="500" y1="139" x2="654" y2="139" stroke="var(--green)" stroke-width="2.6" marker-end="url(#arrow)"/>
      <rect x="514" y="113" width="58" height="18" rx="9" fill="var(--green-soft)" stroke="var(--green)" stroke-width="1.1"/>
      <text x="543" y="125.5" text-anchor="middle" font-family="var(--mono)" font-size="9.5" fill="var(--green)">API Key</text>
      <text x="582" y="126" text-anchor="middle" font-family="var(--sans)" font-size="13" font-weight="600" fill="var(--green)">+</text>
      <rect x="592" y="113" width="58" height="18" rx="9" fill="var(--green-soft)" stroke="var(--green)" stroke-width="1.1"/>
      <text x="621" y="125.5" text-anchor="middle" font-family="var(--mono)" font-size="9.5" fill="var(--green)">Token</text>
      <text x="582" y="166" text-anchor="middle" font-family="var(--sans)" font-size="12" font-weight="500" fill="var(--fg-muted)">2 factores de seguridad</text>

      <!-- back -> neon -->
      <path d="M 872 122 C 930 110, 945 105, 992 105" fill="none" stroke="var(--green)" stroke-width="2.2" marker-end="url(#arrow)"/>
      <g transform="translate(916,89) scale(0.82)"><use href="#lock"/></g>
      <text x="927" y="93" text-anchor="start" font-family="var(--mono)" font-size="10" fill="var(--green)">HTTPS</text>

      <!-- back -> higyrus -->
      <path d="M 872 156 C 930 168, 945 200, 992 203" fill="none" stroke="var(--green)" stroke-width="2.2" marker-end="url(#arrow)"/>
      <g transform="translate(936,214) scale(0.82)"><use href="#lock"/></g>
      <text x="947" y="218" text-anchor="start" font-family="var(--mono)" font-size="10" fill="var(--green)">HTTPS</text>

      <!-- ============ STEP NUMBER BADGES ============ -->
      <g font-family="var(--mono)" font-size="12" font-weight="500">
        <circle cx="248" cy="155" r="11" fill="var(--green)"/><text x="248" y="159.5" text-anchor="middle" fill="#FAFAF7">1</text>
        <circle cx="395" cy="92" r="11" fill="var(--green)"/><text x="395" y="96.5" text-anchor="middle" fill="#FAFAF7">2</text>
        <circle cx="582" cy="92" r="11" fill="var(--green)"/><text x="582" y="96.5" text-anchor="middle" fill="#FAFAF7">3</text>
        <circle cx="690" cy="92" r="11" fill="var(--green)"/><text x="690" y="96.5" text-anchor="middle" fill="#FAFAF7">4</text>
        <circle cx="930" cy="139" r="11" fill="var(--green)"/><text x="930" y="143.5" text-anchor="middle" fill="#FAFAF7">5</text>
      </g>

      <!-- ============ EXPLANATION CARDS ============ -->
      <g>
        <!-- Card 1 -->
        <rect x="16" y="300" width="240" height="208" rx="16" fill="var(--bg-elev-2)" stroke="var(--line)" stroke-width="1"/>
        <circle cx="44" cy="332" r="13" fill="var(--green)"/><text x="44" y="337" text-anchor="middle" font-family="var(--mono)" font-size="13" fill="#FAFAF7">1</text>
        <text x="66" y="337" font-family="var(--sans)" font-size="15" font-weight="600" fill="var(--fg)">Conexión segura</text>
        <text x="36" y="372" font-family="var(--sans)" font-size="13" fill="var(--fg-muted)">
          <tspan x="36" dy="0">La persona entra desde su</tspan>
          <tspan x="36" dy="20">navegador. Todo lo que envía</tspan>
          <tspan x="36" dy="20">y recibe viaja cifrado, como</tspan>
          <tspan x="36" dy="20">una carta en un sobre sellado:</tspan>
          <tspan x="36" dy="20">nadie en el camino puede</tspan>
          <tspan x="36" dy="20">leerla ni cambiarla.</tspan>
        </text>

        <!-- Card 2 -->
        <rect x="272" y="300" width="240" height="208" rx="16" fill="var(--bg-elev-2)" stroke="var(--line)" stroke-width="1"/>
        <circle cx="300" cy="332" r="13" fill="var(--green)"/><text x="300" y="337" text-anchor="middle" font-family="var(--mono)" font-size="13" fill="#FAFAF7">2</text>
        <text x="322" y="337" font-family="var(--sans)" font-size="15" font-weight="600" fill="var(--fg)">Una sola puerta</text>
        <text x="292" y="372" font-family="var(--sans)" font-size="13" fill="var(--fg-muted)">
          <tspan x="292" dy="0">El servidor del front es lo</tspan>
          <tspan x="292" dy="20">único abierto a internet.</tspan>
          <tspan x="292" dy="20">Atiende a los usuarios y, por</tspan>
          <tspan x="292" dy="20">dentro, hace por ellos todos</tspan>
          <tspan x="292" dy="20">los pedidos de información.</tspan>
        </text>

        <!-- Card 3 -->
        <rect x="528" y="300" width="240" height="208" rx="16" fill="var(--bg-elev-2)" stroke="var(--line)" stroke-width="1"/>
        <circle cx="556" cy="332" r="13" fill="var(--green)"/><text x="556" y="337" text-anchor="middle" font-family="var(--mono)" font-size="13" fill="#FAFAF7">3</text>
        <text x="578" y="337" font-family="var(--sans)" font-size="15" font-weight="600" fill="var(--fg)">Doble llave</text>
        <text x="548" y="372" font-family="var(--sans)" font-size="13" fill="var(--fg-muted)">
          <tspan x="548" dy="0">Para hablar con el backend, el</tspan>
          <tspan x="548" dy="20">front muestra DOS credenciales</tspan>
          <tspan x="548" dy="20">a la vez: API Key + Token.</tspan>
          <tspan x="548" dy="20">Como una bóveda con dos</tspan>
          <tspan x="548" dy="20">llaves distintas: si falta una,</tspan>
          <tspan x="548" dy="20">no se abre.</tspan>
        </text>

        <!-- Card 4 -->
        <rect x="784" y="300" width="240" height="208" rx="16" fill="var(--bg-elev-2)" stroke="var(--line)" stroke-width="1"/>
        <circle cx="812" cy="332" r="13" fill="var(--green)"/><text x="812" y="337" text-anchor="middle" font-family="var(--mono)" font-size="13" fill="#FAFAF7">4</text>
        <text x="834" y="337" font-family="var(--sans)" font-size="15" font-weight="600" fill="var(--fg)">Cerebro privado</text>
        <text x="804" y="372" font-family="var(--sans)" font-size="13" fill="var(--fg-muted)">
          <tspan x="804" dy="0">El backend procesa la</tspan>
          <tspan x="804" dy="20">información sensible. No tiene</tspan>
          <tspan x="804" dy="20">puerta a la calle: no se entra</tspan>
          <tspan x="804" dy="20">desde internet, solo desde</tspan>
          <tspan x="804" dy="20">dentro de Google Cloud.</tspan>
        </text>

        <!-- Card 5 -->
        <rect x="1040" y="300" width="240" height="208" rx="16" fill="var(--bg-elev-2)" stroke="var(--line)" stroke-width="1"/>
        <circle cx="1068" cy="332" r="13" fill="var(--green)"/><text x="1068" y="337" text-anchor="middle" font-family="var(--mono)" font-size="13" fill="#FAFAF7">5</text>
        <text x="1090" y="337" font-family="var(--sans)" font-size="15" font-weight="600" fill="var(--fg)">Datos cifrados</text>
        <text x="1060" y="372" font-family="var(--sans)" font-size="13" fill="var(--fg-muted)">
          <tspan x="1060" dy="0">El backend consulta la base de</tspan>
          <tspan x="1060" dy="20">datos (Neon) y los datos del</tspan>
          <tspan x="1060" dy="20">broker (Higyrus) también por</tspan>
          <tspan x="1060" dy="20">HTTPS. La información viaja</tspan>
          <tspan x="1060" dy="20">encriptada de punta a punta.</tspan>
        </text>
      </g>
    </svg>
  </div>

  <footer class="note">GP-Inversiones · Plataforma alojada en Google Cloud (Cloud Run) · Toda la información viaja cifrada (HTTPS / TLS)</footer>
</div>

<script>
  const root = document.documentElement;
  document.getElementById('themeToggle').addEventListener('click', () => {
    root.setAttribute('data-theme', root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  });
</script>
</body>
</html>
